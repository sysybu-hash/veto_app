# ============================================================
#  render.yaml — VETO App · Render Blueprint
#  Backend: Node.js + Express + Socket.io + MongoDB
#
#  Deploy בפעם הראשונה:
#    Render Dashboard → New → Blueprint → בחר repo
#    Render יקרא קובץ זה ויצור את השירות אוטומטית
#
#  Deploy ידני (Service קיים):
#    Settings → Root Directory: backend
#    Build Command:  npm ci --legacy-peer-deps
#    Start Command:  npm start
#    Health Check:   /health
#
#  Public URL ב-Render יכול להיות שונה משם השירות (למשל שירות veto_legal → veto-app-new.onrender.com).
#  בדוק ב-Dashboard → URL אמיתי, ולעדכן VETO_API_BASE / AppConfig בהתאם.
#  בדיקת בריאות:  GET https://<your-service>.onrender.com/health
#  משתני סביבה (מסלול בלי Firebase): backend/ENV_GUIDE.md
# ============================================================

services:
  - type: web
    name: veto_legal
    runtime: node
    region: frankfurt
    plan: free
    # Explicit production branch — every push to main deploys the API.
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    buildCommand: npm ci --legacy-peer-deps
    startCommand: npm start
    healthCheckPath: /health

    envVars:

      # ── Server ──────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      # ── Database ─────────────────────────────────────────────
      # חובה: mongodb+srv://user:pass@cluster/dbname?retryWrites=true&w=majority
      - key: MONGO_URI
        sync: false

      # ── Auth ──────────────────────────────────────────────────
      # חובה: מחרוזת אקראית ארוכה (openssl rand -hex 64)
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d

      # ── Google OAuth ──────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        value: 752712664923-7loca49f7fggd514q8reljn93meatmrf.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── AI — Gemini (צ'אט + תמלול) ────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # ── Cloudinary (הקלטות + ראיות) ───────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Optional: calendar email (ICS) + FCM (replace placeholder google-services) ─
      # - key: PUBLIC_API_BASE
      #   value: https://veto-app-new.onrender.com
      # - key: SMTP_HOST, SMTP_PORT, SMTP_FROM, SMTP_USER, SMTP_PASS
      # - key: FIREBASE_SERVICE_ACCOUNT
      #   sync: false

      # ── Web Push (VAPID) ──────────────────────────────────────
      - key: VAPID_PUBLIC_KEY
        value: BA6oUwfq1kWgWOBSuLmaXiN0TnmZ0xa0aLXGgfg-trezDAwqW_OiVZEWZ0KkaDmNswOeLipP8zcpib_dFE8Q0io
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@veto-legal.com

      # ── Monitoring (Sentry) — אופציונלי ──────────────────────
      - key: SENTRY_DSN
        sync: false

      # ── OTP בפיתוח (אין SMS עדיין) ────────────────────────────
      # הפעל ב-Dashboard: key=RETURN_OTP_IN_JSON  value=1
      # הסר או שנה ל-0 כשמחברים ספק SMS אמיתי
      # - key: RETURN_OTP_IN_JSON
      #   value: "1"
