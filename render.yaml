# Render Blueprint — API ב-https://<שם-השירות>.onrender.com
# Dashboard → New → Blueprint → בחר repo. חובה למלא MONGO_URI + JWT_SECRET.
# Flutter: flutter run --dart-define=VETO_API_BASE=https://veto-app.onrender.com
#
# אם יצרת Web Service ידנית בלי Blueprint: Settings → Root Directory = backend
#   Build: npm ci  |  Start: npm start
# או השאר Root ריק ואז: Build: npm run render-build  |  Start: npm run render-start

services:
  # Backend Service (Node.js API)
  - type: web
    name: veto-app
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: GOOGLE_CLIENT_ID
        value: 752712664923-7loca49f7fggd514q8reljn93meatmrf.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        value: BA6oUwfq1kWgWOBSuLmaXiN0TnmZ0xa0aLXGgfg-trezDAwqW_OiVZEWZ0KkaDmNswOeLipP8zcpib_dFE8Q0io
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@veto-legal.com
      - key: SENTRY_DSN
        sync: false
