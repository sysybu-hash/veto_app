# Continuous deploy: every push to main builds Flutter in CI and deploys to Vercel prod.
# (Local `npm run ship:web` is optional; CI is the source of truth for production web.)
name: Build Flutter Web + Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Render API origin — must match AppConfig / production backend.
env:
  VETO_API_BASE: https://veto-app-new.onrender.com

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: |
          cd frontend
          flutter pub get

      # Do not block production deploy: still run checks for visibility (see summary step).
      - name: Flutter analyze
        id: analyze
        continue-on-error: true
        run: |
          cd frontend
          flutter analyze

      - name: Flutter test
        id: test
        continue-on-error: true
        run: |
          cd frontend
          flutter test

      - name: Quality gate summary
        if: always()
        run: |
          echo "analyze=${{ steps.analyze.outcome }} test=${{ steps.test.outcome }}"
          if [ "${{ steps.analyze.outcome }}" != "success" ] || [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "::warning::Flutter analyze or test did not succeed — still deploying web so production stays in sync."
          fi

      - name: Build Flutter Web
        run: |
          cd frontend
          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          flutter build web --release \
            --no-tree-shake-icons \
            --pwa-strategy=none \
            --dart-define=VETO_API_BASE=${{ env.VETO_API_BASE }} \
            --dart-define=VETO_BUILD_ID=$SHORT_SHA

      # Root Directory must match Vercel project settings (frontend = frontend/vercel.json + build/web).
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          root-directory: frontend
          vercel-version: latest
          vercel-args: '--prod'
