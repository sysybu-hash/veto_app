# Continuous deploy: every push to main builds Flutter in CI and deploys to Vercel prod.
# (Local `npm run ship:web` is optional; CI is the source of truth for production web.)
name: Build Flutter Web + Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Render API origin — must match AppConfig / production backend.
env:
  VETO_API_BASE: https://veto-app-new.onrender.com

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: |
          cd frontend
          flutter pub get

      # Do not block production deploy: still run checks for visibility (see summary step).
      - name: Flutter analyze
        id: analyze
        continue-on-error: true
        run: |
          cd frontend
          flutter analyze

      - name: Flutter test
        id: test
        continue-on-error: true
        run: |
          cd frontend
          flutter test

      - name: Quality gate summary
        if: always()
        run: |
          echo "analyze=${{ steps.analyze.outcome }} test=${{ steps.test.outcome }}"
          if [ "${{ steps.analyze.outcome }}" != "success" ] || [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "::warning::Flutter analyze or test did not succeed — still deploying web so production stays in sync."
          fi

      - name: Build Flutter Web
        run: |
          cd frontend
          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          flutter build web --release \
            --no-tree-shake-icons \
            --pwa-strategy=none \
            --dart-define=VETO_API_BASE=${{ env.VETO_API_BASE }} \
            --dart-define=VETO_BUILD_ID=$SHORT_SHA

      - name: Verify web bundle for Vercel
        working-directory: frontend
        run: |
          set -e
          test -f build/web/index.html || (echo "Missing build/web — Vercel buildCommand will fail." && exit 1)
          ls -la build/web/index.html

      # Deploy from frontend/ so frontend/vercel.json + build/web match Vercel "Root Directory: frontend".
      # Secrets: VERCEL_TOKEN = Account → Tokens.
      # VERCEL_ORG_ID = Team ID (Settings → your team → General → "Team ID", usually team_...),
      #   NOT the project slug and NOT the Project ID.
      # VERCEL_PROJECT_ID = Project → Settings → General → "Project ID" (prj_...).
      - name: Vercel CLI (auth check)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        run: |
          set -e
          npx --yes vercel@latest --version
          npx --yes vercel@latest whoami
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: frontend
        run: |
          set -e
          npx --yes vercel@latest deploy --prod --yes
