name: Build Flutter Web + Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Render API origin — must match AppConfig / production backend.
env:
  VETO_API_BASE: https://veto-app-new.onrender.com

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Flutter analyze + test
        run: |
          cd frontend
          flutter analyze
          flutter test

      - name: Build Flutter Web
        run: |
          cd frontend
          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          flutter build web --release --no-wasm-dry-run \
            --no-tree-shake-icons \
            --pwa-strategy=none \
            --dart-define=VETO_API_BASE=${{ env.VETO_API_BASE }} \
            --dart-define=VETO_BUILD_ID=$SHORT_SHA

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
