  <meta name="color-scheme" content="dark">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="VETO — מנוי הגנה משפטית">
  <meta property="og:description" content="תגובה משפטית חכמה: AI, תרחישים, תיעוד ראיות ושיגור עורך דין בזמן אמת.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="VETO">
  <meta name="twitter:description" content="מערכת תגובה משפטית חכמה ורב-לשונית.">

  <!-- iOS / PWA meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VETO</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0F172A;
      /* Prevent pull-to-refresh on mobile Chrome/Safari */
      overscroll-behavior: none;
    }
    /* Prevent text size auto-adjustment on iOS Safari */
    * { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    /* Prevent blue tap highlight on mobile */
    * { -webkit-tap-highlight-color: transparent; }
    /* Smooth scrolling on iOS */
    flt-glass-pane { touch-action: pan-y; }
  </style>

  <script>
    // ── Web Speech API bridge (called from Flutter via dart:js) ──

    // Speech-to-Text
    window.vetoSTT = {
      _recognition: null,
      _listening: false,

      start: function(lang) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { window.vetoSTTResult('ERROR:not_supported'); return; }
        if (this._listening) return;
        var r = new SR();
        r.lang = lang || 'he-IL';
        r.interimResults = false;
        r.maxAlternatives = 1;
        this._recognition = r;
        this._listening = true;
        r.onresult = function(e) {
          var t = e.results[0][0].transcript;
          window.vetoSTTResult('OK:' + t);
        };
        r.onerror = function(e) {
          window.vetoSTTResult('ERROR:' + e.error);
        };
        r.onend = function() { window.vetoSTT._listening = false; };
        r.start();
      },

      stop: function() {
        if (this._recognition) { this._recognition.stop(); }
        this._listening = false;
      },

      isSupported: function() {
        return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
      }
    };

    // Text-to-Speech
    window.vetoTTS = {
      speak: function(text, lang) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = lang || 'he-IL';
        u.rate = 1.0;
        u.pitch = 1.0;
        window.speechSynthesis.speak(u);
      },
      stop: function() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }
    };
  </script>
</head>
<body>
  <!--
