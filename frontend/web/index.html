  <script>
    // #region agent log (mobile freeze triage)
    // Runtime debug instrumentation (no secrets).
    // NOTE: On HTTPS sites, posting to http://127.0.0.1 can be blocked as mixed content.
    // Therefore we log to console + keep a small in-memory ring buffer that can be copied.
    (function () {
      var SESSION = '4cc158';
      var MAX = 120;
      window.__vetoDbg = window.__vetoDbg || { sessionId: SESSION, events: [] };
      function push(evt) {
        try {
          window.__vetoDbg.events.push(evt);
          if (window.__vetoDbg.events.length > MAX) window.__vetoDbg.events.shift();
        } catch (_) {}
      }
      function send(hypothesisId, message, data) {
        var evt = {
          sessionId: SESSION,
          runId: 'pre-fix',
          hypothesisId: hypothesisId,
          location: 'frontend/web/index.html:dbg',
          message: message,
          data: data || {},
          timestamp: Date.now(),
        };
        push(evt);
        try { console.log('VETO_DBG', evt); } catch (_) {}
      }

      // Avoid PII/secrets: never include JWT, phone, etc.
      var ua = '';
      try { ua = (navigator && navigator.userAgent ? navigator.userAgent : ''); } catch (_) {}
      send('BOOT', 'page_boot', {
        href: (location && location.href) || '',
        ua: ua.slice(0, 180),
        ts: Date.now(),
      });

      window.addEventListener('error', function (e) {
        send('ERR', 'window_error', {
          msg: String(e && e.message ? e.message : ''),
          src: String(e && e.filename ? e.filename : ''),
          line: e && e.lineno,
          col: e && e.colno,
        });
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        send('ERR', 'unhandled_rejection', {
          reason: (r && r.message) ? String(r.message) : String(r),
        });
      });

      // Heartbeat: if these stop appearing before you manually refresh, we likely hit a main-thread stall.
      var hb = 0;
      setInterval(function () {
        hb += 1;
        send('HB', 'heartbeat', { n: hb, vis: document.visibilityState });
      }, 2000);

      // Long tasks observer (main-thread stalls)
      try {
        if ('PerformanceObserver' in window) {
          var po = new PerformanceObserver(function (list) {
            var entries = list.getEntries();
            for (var i = 0; i < entries.length; i++) {
              var lt = entries[i];
              // duration in ms; report only if significant
              if (lt && lt.duration && lt.duration >= 120) {
                send('LT', 'longtask', { durMs: Math.round(lt.duration) });
              }
            }
          });
          po.observe({ type: 'longtask', buffered: true });
          send('BOOT', 'longtask_observer_on', {});
        }
      } catch (_) {}

      document.addEventListener('visibilitychange', function () {
        send('VIS', 'visibility', { state: document.visibilityState });
      });
      window.addEventListener('pagehide', function () {
        send('VIS', 'pagehide', {});
      });
    })();
    // #endregion agent log (mobile freeze triage)
  </script>

  <script>
    // ── Web Speech API bridge (called from Flutter via dart:js) ──

    // Speech-to-Text
    window.vetoSTT = {
      _recognition: null,
      _listening: false,

      start: function(lang) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { window.vetoSTTResult('ERROR:not_supported'); return; }
        if (this._listening) return;
        var r = new SR();
        r.lang = lang || 'he-IL';
        r.interimResults = false;
        r.maxAlternatives = 1;
        this._recognition = r;
        this._listening = true;
        r.onresult = function(e) {
          var t = e.results[0][0].transcript;
          window.vetoSTTResult('OK:' + t);
        };
        r.onerror = function(e) {
          window.vetoSTTResult('ERROR:' + e.error);
        };
        r.onend = function() { window.vetoSTT._listening = false; };
        r.start();
      },

      stop: function() {
        if (this._recognition) { this._recognition.stop(); }
        this._listening = false;
      },

      isSupported: function() {
        return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
      }
    };

    // Text-to-Speech
    window.vetoTTS = {
      speak: function(text, lang) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = lang || 'he-IL';
        u.rate = 1.0;
        u.pitch = 1.0;
        window.speechSynthesis.speak(u);
      },
      stop: function() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }
    };

    // Gemini Multimodal Live — capability check matches gemini_live.mjs; real start/stop merge on module load.
    window.__vetoGeminiLivePending = null;
    window.__vetoGeminiLiveModuleApplied = false;
    (function () {
      var AC = typeof AudioContext !== "undefined" ? AudioContext : (typeof window !== "undefined" ? window.webkitAudioContext : null);
      function geminiLiveCaps() {
        try {
          if (typeof navigator === "undefined" || !navigator.mediaDevices) return false;
          if (typeof navigator.mediaDevices.getUserMedia !== "function") return false;
          if (!AC) return false;
          var hasWorklet = typeof AudioWorkletNode !== "undefined";
          var hasScript = false;
          try {
            hasScript = typeof AC.prototype.createScriptProcessor === "function";
          } catch (e) { hasScript = false; }
          if (!hasWorklet && !hasScript) return false;
          if (typeof isSecureContext !== "undefined" && !isSecureContext) return false;
          return true;
        } catch (e) { return false; }
      }
      window.vetoGeminiLive = {
        isSupported: function () { return geminiLiveCaps(); },
        start: function (lang, jwt, apiBase) {
          window.__vetoGeminiLivePending = { lang: lang, jwt: jwt, apiBase: apiBase };
        },
        stop: function () {
          window.__vetoGeminiLivePending = null;
        }
      };
    })();
    window.vetoGeminiLiveResult = function() {};
  </script>

  <script>
    // Called from Flutter via dart:js to trigger Google OAuth popup
    // Returns a Promise that resolves with the access_token
    window.vetoGoogleOAuth = function(clientId) {
      return new Promise(function(resolve, reject) {
        if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
          reject('GIS not loaded yet');
          return;
        }
        var client = google.accounts.oauth2.initTokenClient({
          client_id: clientId,
          scope: 'email profile openid',
          callback: function(response) {
            if (response && response.access_token) {
              resolve(response.access_token);
            } else {
              reject(response ? response.error : 'No access_token');
            }
          },
          error_callback: function(err) {
            reject(err ? err.type : 'oauth_error');
          }
        });
        client.requestAccessToken({ prompt: 'select_account' });
      });
    };
  </script>

  <!-- Flows (Basics V2) — loaded via CDN ESM (no npm bundling needed for Flutter Web) -->
  <!-- Mobile browsers (especially iOS Safari) can freeze under continuous MutationObserver + fixed overlays.
       We disable Flows on mobile UA by default to protect core app UX. -->
  <script>
    (function () {
      try {
        var ua = (navigator && navigator.userAgent ? navigator.userAgent : "").toLowerCase();
        window.__vetoIsMobile = ua.includes("iphone") || ua.includes("ipad") || ua.includes("ipod") || ua.includes("android") || ua.includes("mobile");
      } catch (e) {
        window.__vetoIsMobile = false;
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flows/js-components/index.css">
  <script type="module">
    if (window.__vetoIsMobile) {
      console.warn("[VETO Flows] disabled on mobile web to prevent freezes");
    } else {
    // Flows on Flutter Web:
    // - Docs order: init() then setupJsComponents() — https://flows.sh/docs/javascript/installation
    // - Flutter paints a full-viewport layer; keep <flows-floating-blocks> last in <body> with high z-index.
    // - esm.sh resolves bare imports inside @flows/js-components (e.g. es-toolkit/compat).
    const ORG_ID = "f674dc3a-2c1b-4561-8d1c-f7f8dbb9b661";
    const ENV_KEY = "production";
    const MANUAL_START_BLOCK_KEY = "veto_welcome";

    let _modulesPromise = null;
    let _componentsSetup = false;
    let _hostReorderObserver = null;
    let _hostFlutterTick = null;

    function _flowsHostParent() {
      return document.querySelector("flt-glass-pane")
        || document.querySelector("flt-scene-host")
        || document.body;
    }

    function _ensureFloatingHostOnTop() {
      const parent = _flowsHostParent();
      let el = document.querySelector("flows-floating-blocks");
      if (!el) {
        el = document.createElement("flows-floating-blocks");
      }
      parent.appendChild(el);
      el.style.setProperty("position", "fixed", "important");
      el.style.setProperty("inset", "0", "important");
      el.style.setProperty("z-index", "2147483647", "important");
      if (!_hostReorderObserver) {
        _hostReorderObserver = new MutationObserver(function() {
          const host = document.querySelector("flows-floating-blocks");
          if (!host) return;
          const p = _flowsHostParent();
          if (p && p.appendChild) {
            p.appendChild(host);
            host.style.setProperty("position", "fixed", "important");
            host.style.setProperty("inset", "0", "important");
            host.style.setProperty("z-index", "2147483647", "important");
          }
        });
        _hostReorderObserver.observe(document.body, { childList: true, subtree: true });
      }
    }

    function _resyncFlowsHostWhileFlutterBoots() {
      if (_hostFlutterTick) return;
      let n = 0;
      _hostFlutterTick = setInterval(function() {
        n += 1;
        const host = document.querySelector("flows-floating-blocks");
        if (host) {
          const p = _flowsHostParent();
          if (p && p.appendChild) p.appendChild(host);
          host.style.setProperty("position", "fixed", "important");
          host.style.setProperty("inset", "0", "important");
          host.style.setProperty("z-index", "2147483647", "important");
        }
        if (n >= 48) {
          clearInterval(_hostFlutterTick);
          _hostFlutterTick = null;
        }
      }, 200);
    }

    async function _loadModules() {
      if (_modulesPromise) return _modulesPromise;
      const JS_VER = "1.21.0";
      const COMPONENTS_VER = "2.7.1";
      _modulesPromise = (async () => {
        const { init, startWorkflow } = await import(`https://esm.sh/@flows/js@${JS_VER}`);
        const { setupJsComponents } = await import(`https://esm.sh/@flows/js-components@${COMPONENTS_VER}`);
        const components = await import(`https://esm.sh/@flows/js-components@${COMPONENTS_VER}/components`);
        const tourComponents = await import(`https://esm.sh/@flows/js-components@${COMPONENTS_VER}/tour-components`);
        const surveyComponents = await import(`https://esm.sh/@flows/js-components@${COMPONENTS_VER}/survey-components`);
        return { init, startWorkflow, setupJsComponents, components, tourComponents, surveyComponents };
      })();
      return _modulesPromise;
    }

    window.vetoFlows = window.vetoFlows || {};
    window.vetoFlows.setUser = async function(userId, role, lang) {
      try {
        if (!userId) return { ok: false, stage: "no_user" };

        const m = await _loadModules();
        const isLocal = (location && location.hostname === "localhost") || false;

        m.init({
          organizationId: ORG_ID,
          environment: ENV_KEY,
          userId: String(userId),
          language: "automatic",
          debug: isLocal,
          userProperties: {
            role: role ? String(role) : "user",
            app: "veto",
            ui_lang: lang ? String(lang) : undefined,
          },
        });

        if (!_componentsSetup) {
          m.setupJsComponents({
            components: { ...m.components },
            tourComponents: { ...m.tourComponents },
            surveyComponents: { ...m.surveyComponents },
          });
          _componentsSetup = true;
        }

        _ensureFloatingHostOnTop();
        _resyncFlowsHostWhileFlutterBoots();

        if (MANUAL_START_BLOCK_KEY && m.startWorkflow) {
          try {
            await m.startWorkflow(MANUAL_START_BLOCK_KEY);
            console.log("[VETO Flows] startWorkflow ok:", MANUAL_START_BLOCK_KEY);
            return { ok: true, stage: "startWorkflow", key: MANUAL_START_BLOCK_KEY };
          } catch (e) {
            console.warn("[VETO Flows] startWorkflow failed:", MANUAL_START_BLOCK_KEY, e);
            return {
              ok: false,
              stage: "startWorkflow",
              key: MANUAL_START_BLOCK_KEY,
              error: (e && (e.message || String(e))) || "unknown_error",
            };
          }
        }
        return { ok: true, stage: "init_only" };
      } catch (e) {
        console.warn("[VETO Flows] init failed:", e);
        return {
          ok: false,
          stage: "init",
          error: (e && (e.message || String(e))) || "unknown_error",
        };
      }
    };
    } // end mobile guard
  </script>

  <script>
    // ── Web Push subscription helper (called from Flutter/Dart) ──
    // vetoPushSubscribe(vapidPublicKey) → Promise<object | null>
    window.vetoPushSubscribe = async function(vapidPublicKey) {
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return null;

        const reg = await navigator.serviceWorker.ready;

        // Convert VAPID public key from base64url to Uint8Array
        const b64 = vapidPublicKey.replace(/-/g, '+').replace(/_/g, '/');
        const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));

        const sub = await reg.pushManager.subscribe({
          userVisibleOnly:     true,
          applicationServerKey: raw,
        });
        return JSON.parse(JSON.stringify(sub));
      } catch (e) {
        console.warn('[VETO Push] subscription failed:', e);
        return null;
      }
    };
  </script>

  <!-- Register push service worker and forcefully unregister old flutter_service_worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          // Unregister the old Flutter service worker that caches old files
          if (registration.active && registration.active.scriptURL.includes('flutter_service_worker.js')) {
            console.log('Unregistering old flutter_service_worker.js');
            registration.unregister().then(() => {
              window.location.reload(true);
            });
          }
        }
      });

      navigator.serviceWorker.register('/push-sw.js', { scope: '/' })
        .catch(function(e) { console.warn('[VETO SW] push-sw registration failed:', e); });
    }
  </script>

  <!-- Flows floating renderer (upgraded by setupJsComponents) -->
  <script>
    if (!window.__vetoIsMobile) {
      document.write("<flows-floating-blocks></flows-floating-blocks>");
    }
  </script>

  <script>
    // Stable entry for Dart (package:web) — the module above assigns window.vetoFlows.setUser; this
    // wrapper exists before first login so the closure always calls the live setUser.
    window.vetoFlowsInvoke = async function(userId, role, lang) {
      if (!window.vetoFlows || typeof window.vetoFlows.setUser !== "function") {
        return { ok: false, stage: "not_ready", error: "vetoFlows.setUser missing (Flows module not loaded?)" };
      }
      return await window.vetoFlows.setUser(userId, role, lang);
    };
  </script>
  <script type="module" src="gemini_live.mjs"></script>
  <script src="flutter_bootstrap.js" defer></script>
