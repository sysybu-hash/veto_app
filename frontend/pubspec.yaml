name: veto
description: VETO – Legal Emergency App (Uber-style for lawyers)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# ══════════════════════════════════════════════════════════════
#  Dependencies
# ══════════════════════════════════════════════════════════════
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Camera ──────────────────────────────────────────────────
  camera: ^0.11.0+1
  # Full-featured camera plugin (preview, capture, flash control)

  # ── Location / GPS ──────────────────────────────────────────
  geolocator: ^11.1.0
  # High-accuracy GPS with permissions handling

  # ── Networking & Upload ─────────────────────────────────────
  http: ^1.2.1
  http_parser: ^4.0.2
  # http        → multipart file upload to backend
  # http_parser → MediaType for MIME-type detection

  # ── Socket.io (real-time dispatch) ──────────────────────────
  socket_io_client: ^2.0.3+1

  # ── WebRTC (in-app audio/video calls) ───────────────────────
  flutter_webrtc: ^1.4.1
  # Peer-to-peer WebRTC calls — web + iOS + Android

  # ── Permissions ─────────────────────────────────────────────
  permission_handler: ^11.3.0
  # Camera, microphone, storage permissions

  # ── Deep Linking ─────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Local storage (JWT + user session) ──────────────────────
  flutter_secure_storage: ^9.0.0

  # ── State management ────────────────────────────────────────
  provider: ^6.1.2

  # ── UI extras ───────────────────────────────────────────────
  google_fonts: ^6.2.1
  pinput: ^5.0.0
  cupertino_icons: ^1.0.8

  # ── Google Sign-In ─────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── File Picker (vault uploads) ─────────────────────────────
  file_picker: ^8.0.0

# ══════════════════════════════════════════════════════════════
#  Dev Dependencies
# ══════════════════════════════════════════════════════════════
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# ══════════════════════════════════════════════════════════════
#  Flutter config
# ══════════════════════════════════════════════════════════════
flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo-VF.ttf

# ── Platform permissions reminder ─────────────────────────────
# iOS  → Info.plist: NSCameraUsageDescription,
#                    NSLocationWhenInUseUsageDescription,
#                    NSMicrophoneUsageDescription
#
# Android → AndroidManifest.xml:
#   <uses-permission android:name="android.permission.CAMERA"/>
#   <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
#   <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
#   <uses-permission android:name="android.permission.RECORD_AUDIO"/>
#   <uses-permission android:name="android.permission.INTERNET"/>
#   minSdkVersion 21 (in android/app/build.gradle)
