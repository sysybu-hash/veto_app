name: veto
description: VETO – Legal Emergency App (Uber-style for lawyers)
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

# ══════════════════════════════════════════════════════════════
#  Dependencies
# ══════════════════════════════════════════════════════════════
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Camera ──────────────────────────────────────────────────
  camera: ^0.11.0+1
  # Full-featured camera plugin (preview, capture, flash control)

  # ── Location / GPS ──────────────────────────────────────────
  geolocator: ^14.0.2
  # High-accuracy GPS with permissions handling

  # ── App dirs (Agora MediaRecorder output on iOS/Android) ─────
  path_provider: ^2.1.0

  # ── Networking & Upload ─────────────────────────────────────
  http: ^1.2.1
  http_parser: ^4.0.2
  # http        → multipart file upload to backend
  # http_parser → MediaType for MIME-type detection

  # ── Socket.io (real-time dispatch) ──────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Agora RTC (video/audio; configure AGORA_APP_ID + AGORA_APP_CERTIFICATE)
  # Pinned to ^6.5.3 — pub's solver forbids 6.6.x while
  # `flutter_secure_storage_windows: ^4.1.0` demands `ffi ^2.0.0` and
  # `agora_rtc_engine 6.6.x` demands `ffi ^1.1.2`. Upgrade once
  # secure_storage publishes a release with `ffi ^1.x` support.
  agora_rtc_engine: ^6.5.3

  # ── Permissions ─────────────────────────────────────────────
  permission_handler: ^11.3.0
  # Camera, microphone, storage permissions

  # ── Deep Linking ─────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── In-app maps (Google embed on mobile/desktop) ───────────
  webview_flutter: ^4.10.0

  # ── Local storage (JWT + user session) ──────────────────────
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3

  # ── State management ────────────────────────────────────────
  provider: ^6.1.2

  # ── UI extras ───────────────────────────────────────────────
  google_fonts: ^6.2.1
  pinput: ^5.0.0
  cupertino_icons: ^1.0.8

  # ── Google Sign-In ─────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Push (FCM) — add google-services / GoogleService-Info for real devices
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # ── File Picker (vault uploads) ─────────────────────────────
  file_picker: ^8.0.0
  web: ^1.1.1
  # Gzip compression for vault payloads (Web + mobile)
  archive: ^3.6.0
  speech_to_text: ^7.3.0
# ══════════════════════════════════════════════════════════════
#  Dev Dependencies
# ══════════════════════════════════════════════════════════════
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  webview_flutter_platform_interface: ^2.14.0

# ══════════════════════════════════════════════════════════════
#  Flutter config
# ══════════════════════════════════════════════════════════════
flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo-VF.ttf

# ── Platform permissions reminder ─────────────────────────────
# iOS  → Info.plist: NSCameraUsageDescription,
#                    NSLocationWhenInUseUsageDescription,
#                    NSMicrophoneUsageDescription
#
# Android → AndroidManifest.xml:
#   <uses-permission android:name="android.permission.CAMERA"/>
#   <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
#   <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
#   <uses-permission android:name="android.permission.RECORD_AUDIO"/>
#   <uses-permission android:name="android.permission.INTERNET"/>
#   minSdkVersion 21 (in android/app/build.gradle)
